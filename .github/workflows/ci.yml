name: CI
run-name: ${{ github.actor }} is running CI on ${{ github.ref }}

on:
  push:
    paths:
      - '**/*.ts'
      - '**/*.js'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.js'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/*.yml'

# Prevents multiple workflow runs for the same ref/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicitly define permissions for security
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        bun: [1.3.14]

    name: BUN ${{ matrix.bun }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v7

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: ⚡ Install dependencies (with bun)
        run: bun install

      - name: 🔍 Lint
        run: bun run lint

      - name: 🏗️ Build
        run: bun run build

      - name: 🛡️ Audit dependencies
        run: bun audit --audit-level=high
